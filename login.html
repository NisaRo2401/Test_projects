<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Test Projects Hub</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--color-bg-deep) 0%, var(--color-bg-surface) 60%, var(--color-bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }

    .login-card {
      width: min(480px, 100%);
    }

    .login-card h1 {
      font-size: clamp(1.8rem, 2.5vw, 2.4rem);
      margin-bottom: var(--space-2);
    }

    .login-card .subtitle {
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
      line-height: 1.7;
    }

    .form-group {
      display: grid;
      gap: var(--space-4);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .toggle-row span {
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }

    .login-footer {
      margin-top: var(--space-6);
      padding-top: var(--space-5);
      border-top: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <section class="card login-card">
    <h1>Anmelden</h1>
    <p class="subtitle">Bitte melde dich an, um Zugriff auf das Dashboard zu erhalten.</p>

    <form id="authForm">
      <div class="form-group">
        <label class="form-field">
          <span class="form-label">E-Mail-Adresse</span>
          <input class="form-input" type="email" id="email" placeholder="name@example.com" required>
        </label>
        <label class="form-field">
          <span class="form-label">Passwort</span>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required>
        </label>

        <button class="btn btn-primary btn-full" type="submit" id="submitBtn">Anmelden</button>

        <div class="toggle-row">
          <span id="modeText">Noch keinen Account?</span>
          <button class="btn btn-ghost" type="button" id="toggleBtn">Registrieren</button>
        </div>

        <p class="status" id="statusMsg" role="alert"></p>
      </div>
    </form>

    <div class="login-footer">
      Falls du bereits angemeldet bist, wirst du automatisch weitergeleitet.
    </div>
  </section>

  <script>window.APP_BASE_PATH = '';</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    const form       = document.getElementById('authForm');
    const submitBtn  = document.getElementById('submitBtn');
    const statusMsg  = document.getElementById('statusMsg');
    const toggleBtn  = document.getElementById('toggleBtn');
    const modeText   = document.getElementById('modeText');
    let isSignUp = false;

    function setStatus(msg, type = '') {
      statusMsg.textContent = msg;
      statusMsg.className = 'status ' + type;
    }

    function applyMode() {
      submitBtn.textContent = isSignUp ? 'Registrieren' : 'Anmelden';
      modeText.textContent  = isSignUp ? 'Schon einen Account?' : 'Noch keinen Account?';
      toggleBtn.textContent = isSignUp ? 'Anmelden' : 'Registrieren';
      document.querySelector('h1').textContent = isSignUp ? 'Registrieren' : 'Anmelden';
    }

    toggleBtn.addEventListener('click', () => {
      isSignUp = !isSignUp;
      setStatus('');
      applyMode();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('Bitte warten …');
      submitBtn.disabled = true;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const result = isSignUp
          ? await auth.signUp(email, password)
          : await auth.signIn(email, password);

        if (result.error) throw result.error;

        if (isSignUp) {
          setStatus('Registrierung erfolgreich! Bitte bestätige deine E-Mail-Adresse.', 'success');
        } else {
          setStatus('Erfolgreich angemeldet! Du wirst weitergeleitet …', 'success');
          window.location.href = 'index.html';
        }
      } catch (err) {
        setStatus(err.message || 'Fehler beim Login', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      applyMode();
      await auth.redirectIfAuthenticated();
    });
  </script>
</body>
</html>
